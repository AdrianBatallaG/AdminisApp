services:
  - type: web
    name: adminis-lab-api
    runtime: php
    plan: free
    rootDir: Backend
    buildCommand: composer install --no-dev --optimize-autoloader
    startCommand: php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: adminis-lab-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        sync: false
      - key: CORS_SUPPORTS_CREDENTIALS
        value: false
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false
      - key: SESSION_SECURE_COOKIE
        value: true
      - key: SESSION_SAME_SITE
        value: none

databases:
  - name: adminis-lab-db
    plan: free
    databaseName: adminis_lab
    user: adminis_lab_user
